<!DOCTYPE html>

<html>
<head>
    <title>Login - AnuAI</title>
    <style>
        body {
            background: #343541;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #202123;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            background: #10a37f;
            color: white;
            cursor: pointer;
        }
        a { color: #10a37f; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

```
<form method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<p>New user? <a href="/register">Register</a></p>
```

</div>

</body>
</html>
